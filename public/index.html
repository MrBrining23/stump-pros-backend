<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a1a1a" />
  <title>Stump Pros WV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; -webkit-tap-highlight-color: transparent; }
    #root { min-height: 100vh; }
    .app-content { padding: calc(20px + env(safe-area-inset-top, 0px)) 16px 100px 16px; }
    .app-tab-bar { padding: 6px 0 calc(6px + env(safe-area-inset-bottom, 8px)) 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Load Google Maps Places API if a key is configured
    fetch('/api/settings/maps-key').then(r=>r.json()).then(d=>{
      if (!d.key) return;
      var s = document.createElement('script');
      s.src = 'https://maps.googleapis.com/maps/api/js?key='+d.key+'&libraries=places&callback=__gmapsReady';
      s.async = true; s.defer = true;
      window.__gmapsReady = function() { window.dispatchEvent(new Event('google-maps-ready')); };
      document.head.appendChild(s);
    }).catch(function(){});
  </script>
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
